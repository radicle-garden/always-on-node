name: e2e-tests

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-dep-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-dep-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install rad CLI
        run: |
          curl -sSf https://radicle.xyz/install | sh
          echo "$HOME/.radicle/bin" >> $GITHUB_PATH
          echo "RAD_BINARY_PATH=$HOME/.radicle/bin/rad" >> $GITHUB_ENV
          echo "PROFILE_STORAGE_PATH=$HOME/radicle-profiles" >> $GITHUB_ENV

      - name: Verify environment
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          echo "=== rad CLI ==="
          rad --version
          echo "RAD_BINARY_PATH=$RAD_BINARY_PATH"
          echo "PROFILE_STORAGE_PATH=$PROFILE_STORAGE_PATH"
          echo "=== Docker ==="
          docker version
          docker info --format '{{.ServerVersion}}'
          echo "DOCKER_HOST=$DOCKER_HOST"

      - name: Run E2E tests
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          CONTAINER_PLATFORM: linux/amd64
          CONTAINER_USERNS_MODE: ""
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
